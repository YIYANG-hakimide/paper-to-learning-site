name: 问题报告 / Bug report
description: 报告安装、运行、生成结果或审查脚本的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: 问题发生在哪里 / Area
      options:
        - 安装或更新 / Install or update
        - 学习图册 / Learning album
        - PPT
        - HTML 互动阅读器 / Interactive reader
        - 审查脚本 / Audit scripts
        - GitHub Pages
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / Actual result
      description: 可附错误信息或脱敏截图，请删除文件路径、邮箱、令牌等隐私信息。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境 / Environment
      placeholder: Codex version, operating system, selected output mode
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私检查 / Privacy check
      options:
        - label: 我已删除 API Key、Cookie、私人路径和未公开材料。
          required: true
